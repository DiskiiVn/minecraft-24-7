name: Máy chủ Minecraft Serveo IPv4

on:
  push:
    branches: [ chính ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  may_chu:
    runs-on: ubuntu-latest
    env:
      SERVER_DIR: ${{ github.workspace }}/may_chu
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Tải máy chủ Minecraft
        run: |
          mkdir -p $SERVER_DIR
          cd $SERVER_DIR
          wget -O server.jar https://piston-data.mojang.com/v1/objects/8dd1a28015f51b1803213892b50b7b4fc76e594d/server.jar
          echo "eula=true" > eula.txt

      - name: Chạy máy chủ và Serveo tunnel
        run: |
          cd $SERVER_DIR
          java -Xmx2G -jar server.jar nogui &
          MC_PID=$!
          sleep 20
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R anbuoitoikhong:25565:localhost:25565 serveo.net &
          SSH_PID=$!
          sleep 5
          echo "=============================================="
          echo "Địa chỉ máy chủ: anbuoitoikhong.serveo.net:25565"
          echo "Địa chỉ cố định, không thay đổi."
          echo "=============================================="
          wait $MC_PID
        continue-on-error: true

      - name: Tự động khởi động lại để duy trì 24/7
        if: success() || failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'minecraft-server-serveo.yml',
              ref: context.ref
            });
