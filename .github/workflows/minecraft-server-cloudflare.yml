# .github/workflows/minecraft-server-cloudflare.yml
# Máy chủ Minecraft 24/7 với Cloudflare Tunnel - IPv4 cố định qua tên miền

name: Máy chủ Minecraft Cloudflare Tunnel

on:
  push:
    branches: [ chính ]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  may_chu:
    runs-on: ubuntu-latest
    env:
      SERVER_DIR: ${{ github.workspace }}/may_chu
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Tải máy chủ Minecraft
        run: |
          mkdir -p $SERVER_DIR
          cd $SERVER_DIR
          wget -O server.jar https://piston-data.mojang.com/v1/objects/8dd1a28015f51b1803213892b50b7b4fc76e594d/server.jar
          echo "eula=true" > eula.txt

      - name: Cài đặt cloudflared
        run: |
          wget -O cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Chạy máy chủ và Cloudflare Tunnel
        run: |
          cd $SERVER_DIR
          java -Xmx2G -jar server.jar nogui &
          MC_PID=$!
          sleep 15
          ../cloudflared tunnel --no-autoupdate run --token eyJhIjoiZGY4YmMyZDZhZTAyZGQ1OTA1MThhMzJmNGJkMGZhOTQiLCJ0IjoiYzU1NTc4ODgtNGUwNi00YmNiLTg0MzUtZTlhMDIxODA1M2ViIiwicyI6Ik5qQmpaRFkzTm1VdE16RTJZaTAwWWpneUxXSmpaR1F0Wm1ZeU56WTFPRGsxTkRoaiJ9 &
          CLOUD_PID=$!
          echo "Máy chủ Minecraft đang chạy"
          echo "Địa chỉ: mc.TEN-MIEN-CUA-BAN:25565"
          echo "Địa chỉ cố định, không thay đổi."
          wait $MC_PID
        continue-on-error: true

      - name: Tự động khởi động lại để duy trì 24/7
        if: success() || failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'minecraft-server-cloudflare.yml',
              ref: context.ref
            });
